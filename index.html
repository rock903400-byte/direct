<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>功能入口網 - LINE 驗證</title>
    <!-- 引入 Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <div class="container h-100 d-flex flex-column justify-content-center align-items-center min-vh-100">
        
        <!-- 載入中畫面 -->
        <div id="loading" class="text-center">
            <div class="spinner-border text-success" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-2 text-secondary">正在連接 LINE...</p>
        </div>

        <!-- 登入閘道 (未登入時顯示) -->
        <div id="login-section" class="card shadow-sm p-4 text-center d-none" style="max-width: 400px; width: 100%;">
            <h2 class="mb-4 fw-bold">歡迎使用</h2>
            <p class="text-muted mb-4">請先透過 LINE 驗證您的身分以進入系統</p>
            <button id="btn-login" class="btn btn-success btn-lg w-100 py-3">
                <img src="https://upload.wikimedia.org/wikipedia/commons/4/41/LINE_logo.svg" alt="LINE" width="24" class="me-2">
                使用 LINE 登入
            </button>
        </div>

        <!-- 功能選單 (登入後顯示) -->
        <div id="content-section" class="w-100 d-none" style="max-width: 600px;">
            <div class="card shadow-sm p-4 mb-4">
                <div class="d-flex align-items-center mb-4">
                    <img id="user-avatar" src="" alt="Avatar" class="rounded-circle me-3 border" width="60" height="60">
                    <div>
                        <h4 class="mb-0">您好，<span id="user-name">訪客</span></h4>
                        <small class="text-muted">已通過 LINE 認證</small>
                    </div>
                </div>

                <hr>

                <div class="row g-3">
                    <!-- 功能 1 -->
                    <div class="col-12">
                        <a href="https://www.google.com" target="_blank" class="btn btn-outline-primary btn-lg w-100 text-start d-flex justify-content-between align-items-center py-3">
                            <span>🚀 功能一：外部系統連結</span>
                            <i class="bi bi-chevron-right"></i>
                        </a>
                    </div>
                    <!-- 功能 2 -->
                    <div class="col-12">
                        <a href="https://www.google.com" target="_blank" class="btn btn-outline-primary btn-lg w-100 text-start d-flex justify-content-between align-items-center py-3">
                            <span>📊 功能二：數據報表</span>
                            <i class="bi bi-chevron-right"></i>
                        </a>
                    </div>
                    <!-- 功能 3 -->
                    <div class="col-12">
                        <a href="https://www.google.com" target="_blank" class="btn btn-outline-primary btn-lg w-100 text-start d-flex justify-content-between align-items-center py-3">
                            <span>⚙️ 功能三：設定中心</span>
                            <i class="bi bi-chevron-right"></i>
                        </a>
                    </div>
                </div>

                <div class="mt-5 text-center">
                    <button id="btn-logout" class="btn btn-link text-danger">登出 LINE 帳號</button>
                </div>
            </div>
        </div>

    </div>

    <!-- 引入 LIFF SDK -->
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <!-- 引入自定義腳本 -->
    <script src="app.js"></script>
</body>
</html>
