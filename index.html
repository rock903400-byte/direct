<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>儲互社督導管理入口網</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 頂部導覽列 -->
    <nav class="main-navbar">
        <div class="navbar-inner">
            <div class="navbar-brand-wrap">
                <i class="bi bi-shield-lock"></i>
                <span>儲互社管理入口網</span>
            </div>
            <button id="theme-toggle" class="theme-btn" aria-label="切換主題">
                <i class="bi bi-moon-stars-fill" id="theme-icon"></i>
            </button>
        </div>
    </nav>

    <!-- 主要內容 -->
    <main class="main-content">
        <div class="portal-card">
            <div class="card-header-section">
                <h2 class="card-title">功能目錄</h2>
                <p class="card-subtitle">請選擇下方功能進入對應系統</p>
            </div>

            <!-- 搜尋列 -->
            <div class="search-wrapper">
                <i class="bi bi-search search-icon"></i>
                <input type="text" id="search-input" class="search-input" placeholder="搜尋功能..." autocomplete="off">
                <button id="search-clear" class="search-clear" aria-label="清除搜尋">
                    <i class="bi bi-x-circle-fill"></i>
                </button>
            </div>

            <!-- 功能列表 -->
            <div id="feature-list" class="feature-list">
                <!-- 功能 1 -->
                <a href="https://8asdxeziyl2ozfrmkpzof3.streamlit.app/" target="_blank"
                   class="feature-item" data-keywords="儲互社分析 數據 趨勢 經營 分析">
                    <div class="feature-icon-wrap bg-blue">
                        <i class="bi bi-bar-chart-line"></i>
                    </div>
                    <div class="feature-text">
                        <div class="feature-name">儲互社分析</div>
                        <div class="feature-desc">數據趨勢與經營狀況分析</div>
                    </div>
                    <i class="bi bi-arrow-right-short feature-arrow"></i>
                </a>

                <!-- 功能 2 -->
                <a href="https://cub-mobile-assistant.web.app/" target="_blank"
                   class="feature-item" data-keywords="法規查詢 法規 行政命令 檢索">
                    <div class="feature-icon-wrap bg-gold">
                        <i class="bi bi-journal-text"></i>
                    </div>
                    <div class="feature-text">
                        <div class="feature-name">法規查詢</div>
                        <div class="feature-desc">相關法規與行政命令檢索</div>
                    </div>
                    <i class="bi bi-arrow-right-short feature-arrow"></i>
                </a>

                <!-- 功能 3 -->
                <a href="https://culroc-line.rock903400.workers.dev/?id=6666" target="_blank"
                   class="feature-item" data-keywords="行動秘書 帳務查詢 社務 互動廣場">
                    <div class="feature-icon-wrap bg-green">
                        <i class="bi bi-phone-vibrate"></i>
                    </div>
                    <div class="feature-text">
                        <div class="feature-name">儲互社行動秘書</div>
                        <div class="feature-desc">個人帳務查詢與社務互動廣場</div>
                    </div>
                    <i class="bi bi-arrow-right-short feature-arrow"></i>
                </a>

                <!-- 功能 4 -->
                <a href="https://rock903400-byte.github.io/credit-score-system/" target="_blank"
                   class="feature-item" data-keywords="信用評分 核貸 試算 信用風險 額度 模擬">
                    <div class="feature-icon-wrap bg-purple">
                        <i class="bi bi-calculator"></i>
                    </div>
                    <div class="feature-text">
                        <div class="feature-name">信用評分與核貸試算系統</div>
                        <div class="feature-desc">信用風險評估與額度模擬分析</div>
                    </div>
                    <i class="bi bi-arrow-right-short feature-arrow"></i>
                </a>

                <!-- 功能 5 -->
                <a href="https://downloader-api-743693957557.us-central1.run.app" target="_blank"
                   class="feature-item" data-keywords="資料下載 報表 檔案 下載">
                    <div class="feature-icon-wrap bg-orange">
                        <i class="bi bi-download"></i>
                    </div>
                    <div class="feature-text">
                        <div class="feature-name">資料下載系統</div>
                        <div class="feature-desc">報表與檔案下載工具</div>
                    </div>
                    <i class="bi bi-arrow-right-short feature-arrow"></i>
                </a>

                <!-- 空搜尋提示 -->
                <div id="no-results" class="no-results" style="display:none;">
                    <i class="bi bi-search"></i>
                    <p>找不到符合「<span id="search-term"></span>」的功能</p>
                </div>
            </div>

        </div>
    </main>

    <!-- 頁尾 -->
    <footer class="main-footer">
        <div class="footer-inner">
            <span>© 2026 儲互社督導管理入口網</span>
            <span class="footer-divider">·</span>
            <span>版本 2.0</span>
            <span class="footer-divider">·</span>
            <a href="mailto:rock90340@gmail.com" class="footer-link">聯絡管理員</a>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
